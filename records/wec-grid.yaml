Description: >-
  WEC-Grid is an open-source software framework that integrates Wave Energy
  Converter (WEC) models into power system simulations. It enables researchers
  and practitioners to perform preliminary integration studies of renewable
  wave energy with grid steady-state analysis.

  Wave energy integration into power grids faces a critical modeling challenge
  current power system tools (such as PSS®E and PyPSA) and marine hydrodynamic
  simulators (such as WEC-Sim) operate independently. This separation hampers
  collaboration between marine energy and power system communities.

  WEC-Grid bridges this gap by providing a unified modeling approach that
  accurately represents interactions between hydrodynamic behaviors and
  electrical power systems. The framework lowers technical barriers, supports
  reproducible workflows, and fosters cross-domain collaboration.
